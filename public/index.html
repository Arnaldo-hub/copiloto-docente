<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Copiloto Docente</title>

<style>
body{
    font-family: Arial, Helvetica, sans-serif;
    background:#f4f6f8;
    margin:0;
    padding:40px;
}

.container{
    max-width:800px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    margin-bottom:30px;
}

label{
    font-weight:bold;
    display:block;
    margin-top:15px;
}

input{
    width:100%;
    padding:10px;
    margin-top:5px;
    border-radius:5px;
    border:1px solid #ccc;
    font-size:16px;
}

button{
    margin-top:25px;
    width:100%;
    padding:12px;
    font-size:18px;
    border:none;
    border-radius:5px;
    background:#2c7be5;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#1a5fd0;
}

#resultado{
    margin-top:40px;
    padding:20px;
    background:#fafafa;
    border:1px solid #ddd;
    border-radius:8px;
    white-space:pre-wrap;
    line-height:1.6;
}
</style>
</head>

<body>

<div class="container">
    <h1>Planificación de Clase</h1>

    <form id="formulario">
        <label>Asignatura</label>
        <input type="text" id="asignatura" required>

        <label>Curso</label>
        <input type="text" id="curso" required>

        <label>Unidad</label>
        <input type="text" id="unidad" required>

        <label>OA</label>
        <input type="text" id="oa" required>

        <label>Duración de la clase (minutos)</label>
        <input type="number" id="duracion" required>

        <button type="submit">Generar planificación paso a paso</button>
    </form>

    <div id="resultado"></div>
</div>

<script>
document.getElementById('formulario').addEventListener('submit', async function(e){
    e.preventDefault();

    const datos = {
        asignatura: document.getElementById('asignatura').value,
        curso: document.getElementById('curso').value,
        unidad: document.getElementById('unidad').value,
        oa: document.getElementById('oa').value,
        duracion: document.getElementById('duracion').value
    };

    const resultadoDiv = document.getElementById('resultado');
    resultadoDiv.innerHTML = "Generando planificación...";

    try {
        const respuesta = await fetch('/copiloto/generar', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(datos)
        });

        const json = await respuesta.json();

        resultadoDiv.innerHTML = json.resultado;

    } catch (error) {
        resultadoDiv.innerHTML = "Error al generar la planificación.";
        console.error(error);
    }
});
</script>

</body>
</html>
