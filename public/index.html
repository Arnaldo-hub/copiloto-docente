<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Copiloto Docente</title>
<style>
body{font-family:Arial;background:#f4f6f8;padding:40px}
.container{max-width:900px;margin:auto;background:white;padding:30px;border-radius:10px}
label{font-weight:bold;margin-top:15px;display:block}
select,input{width:100%;padding:10px;margin-top:5px}
button{margin-top:25px;width:100%;padding:12px;font-size:18px}
#resultado{margin-top:40px;white-space:pre-wrap}
</style>
</head>
<body>

<div class="container">
<h1>Planificación de Clase</h1>

<label>Asignatura</label>
<select id="asignatura"></select>

<label>Curso</label>
<select id="curso"></select>

<label>Unidad</label>
<select id="unidad"></select>

<label>OA</label>
<div id="oaContainer"></div>

<label>Duración</label>
<input type="number" id="duracion" value="60">

<button onclick="generar()">Generar planificación</button>

<div id="resultado"></div>
</div>

<script>
let base = {};

const asig = document.getElementById('asignatura');
const curso = document.getElementById('curso');
const unidad = document.getElementById('unidad');
const oaDiv = document.getElementById('oaContainer');

fetch('/base_curricular.json')
  .then(r=>r.json())
  .then(data=>{
    base = data;
    Object.keys(base).forEach(a=>{
      asig.innerHTML += `<option>${a}</option>`;
    });
  });

asig.onchange = ()=>{
  curso.innerHTML="";
  unidad.innerHTML="";
  oaDiv.innerHTML="";
  Object.keys(base[asig.value]).forEach(c=>{
    curso.innerHTML += `<option>${c}</option>`;
  });
};

curso.onchange = ()=>{
  unidad.innerHTML="";
  oaDiv.innerHTML="";
  Object.keys(base[asig.value][curso.value]).forEach(u=>{
    unidad.innerHTML += `<option>${u}</option>`;
  });
};

unidad.onchange = ()=>{
  oaDiv.innerHTML="";
  base[asig.value][curso.value][unidad.value].forEach(o=>{
    oaDiv.innerHTML += `<label><input type="checkbox" value="${o}"> ${o}</label>`;
  });
};

async function generar(){
  const oas = [...document.querySelectorAll('#oaContainer input:checked')]
              .map(x=>x.value).join(", ");

  const res = await fetch('/copiloto/generar',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      asignatura: asig.value,
      curso: curso.value,
      unidad: unidad.value,
      oa: oas,
      duracion: document.getElementById('duracion').value
    })
  });

  const json = await res.json();
  resultado.innerText = json.resultado;
}
</script>

</body>
</html>
