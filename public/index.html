<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Copiloto Docente</title>

<style>
    body{
        font-family: Arial, Helvetica, sans-serif;
        background:#f4f6f8;
        margin:0;
        padding:40px;
    }
    .container{
        max-width:700px;
        margin:auto;
        background:white;
        padding:30px;
        border-radius:10px;
        box-shadow:0 10px 25px rgba(0,0,0,0.1);
    }
    h1{
        text-align:center;
        margin-bottom:25px;
    }
    label{
        font-weight:bold;
        display:block;
        margin-top:15px;
    }
    input{
        width:100%;
        padding:10px;
        margin-top:5px;
        border-radius:6px;
        border:1px solid #ccc;
        font-size:14px;
    }
    button{
        margin-top:25px;
        width:100%;
        padding:14px;
        border:none;
        border-radius:6px;
        font-size:16px;
        background:#2c7be5;
        color:white;
        cursor:pointer;
    }
    button:hover{
        background:#1a5edb;
    }
    #resultado{
        margin-top:30px;
        white-space:pre-wrap;
        background:#f1f3f5;
        padding:15px;
        border-radius:6px;
        min-height:100px;
    }
</style>
</head>

<body>
<div class="container">
    <h1>Planificación de Clase</h1>

    <form id="formulario">
        <label>Asignatura</label>
        <input type="text" id="asignatura" placeholder="Lenguaje y Comunicación" required>

        <label>Curso</label>
        <input type="text" id="curso" value="4 Básico" required>

        <label>Unidad</label>
        <input type="text" id="unidad" value="1" required>

        <label>OA</label>
        <input type="text" id="oa" placeholder="1,2,5" required>

        <label>Duración Clase (minutos)</label>
        <input type="number" id="duracion" value="60" required>

        <button type="submit">Generar la clase paso a paso</button>
    </form>

    <div id="resultado"></div>
</div>

<script>
document.getElementById('formulario').addEventListener('submit', async function(e){
    e.preventDefault();

    const datos = {
        asignatura: document.getElementById('asignatura').value,
        curso: document.getElementById('curso').value,
        unidad: document.getElementById('unidad').value,
        oa: document.getElementById('oa').value,
        duracion: document.getElementById('duracion').value
    };

    document.getElementById('resultado').innerText = "Generando planificación...";

    const respuesta = await fetch('/copiloto/generar', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(datos)
    });

    const texto = await respuesta.text();
    document.getElementById('resultado').innerText = texto;
});
</script>

</body>
</html>
