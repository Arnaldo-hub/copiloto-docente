<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Copiloto Docente</title>

<style>
body{font-family:Arial;background:#f4f6f8;padding:40px}
.container{max-width:900px;margin:auto;background:white;padding:30px;border-radius:10px;box-shadow:0 0 15px rgba(0,0,0,0.1)}
label{font-weight:bold;margin-top:15px;display:block}
input,select{width:100%;padding:10px;margin-top:5px;border-radius:5px;border:1px solid #ccc}
button{margin-top:25px;width:100%;padding:12px;font-size:18px;border:none;border-radius:5px;background:#2c7be5;color:white;cursor:pointer}
#oaContainer{margin-top:10px}
#resultado{margin-top:40px;white-space:pre-wrap}
</style>
</head>
<body>

<div class="container">
<h1>Planificación de Clase</h1>

<label>Asignatura</label>
<select id="asignatura"></select>

<label>Curso</label>
<select id="curso"></select>

<label>Unidad</label>
<select id="unidad"></select>

<label>OA a trabajar</label>
<div id="oaContainer"></div>

<label>Duración (minutos)</label>
<input type="number" id="duracion" value="60">

<button onclick="generar()">Generar planificación</button>

<div id="resultado"></div>
</div>

<script>
let baseCurricular = {};

// Cargar JSON oficial
fetch("base_curricular.json")
  .then(res => res.json())
  .then(data => {
    baseCurricular = data;
    cargarAsignaturas();
  });

function cargarAsignaturas(){
  const select = document.getElementById('asignatura');
  select.innerHTML = "<option value=''>Seleccione</option>";
  Object.keys(baseCurricular).forEach(a=>{
    select.innerHTML += `<option value="${a}">${a}</option>`;
  });
}

document.getElementById('asignatura').addEventListener('change', cargarCursos);
document.getElementById('curso').addEventListener('change', cargarUnidades);
document.getElementById('unidad').addEventListener('change', cargarOA);

function cargarCursos(){
  const asig = asignatura.value;
  curso.innerHTML = "<option value=''>Seleccione</option>";
  unidad.innerHTML = "";
  oaContainer.innerHTML = "";

  if(baseCurricular[asig]){
    Object.keys(baseCurricular[asig]).forEach(c=>{
      curso.innerHTML += `<option value="${c}">${c}</option>`;
    });
  }
}

function cargarUnidades(){
  const asig = asignatura.value;
  const cur = curso.value;
  unidad.innerHTML = "<option value=''>Seleccione</option>";
  oaContainer.innerHTML = "";

  if(baseCurricular[asig] && baseCurricular[asig][cur]){
    Object.keys(baseCurricular[asig][cur]).forEach(u=>{
      unidad.innerHTML += `<option value="${u}">${u}</option>`;
    });
  }
}

function cargarOA(){
  const asig = asignatura.value;
  const cur = curso.value;
  const uni = unidad.value;
  oaContainer.innerHTML = "";

  if(baseCurricular[asig] && baseCurricular[asig][cur]){
    baseCurricular[asig][cur][uni].forEach(oa=>{
      oaContainer.innerHTML += `
        <label>
          <input type="checkbox" value="${oa}"> ${oa}
        </label>`;
    });
  }
}

async function generar(){
  const oas = [...document.querySelectorAll('#oaContainer input:checked')]
               .map(x=>x.value).join(", ");

  const datos = {
    asignatura: asignatura.value,
    curso: curso.value,
    unidad: unidad.value,
    oa: oas,
    duracion: duracion.value
  };

  resultado.innerHTML="Generando planificación...";

  const res = await fetch('/copiloto/generar',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(datos)
  });

  const json = await res.json();
  resultado.innerHTML = json.resultado;
}
</script>

</body>
</html>
