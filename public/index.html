<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Copiloto Docente</title>
</head>
<body>
  <h1>Copiloto Docente</h1>

  <form id="formulario">
    <input type="text" id="nombre" placeholder="Tu nombre" required />
    <input type="text" id="asignatura" placeholder="Asignatura" required />
    <input type="text" id="tema" placeholder="Tema" required />
    <button type="submit">Generar planificación</button>
  </form>

  <pre id="resultado"></pre>

  <script>
    document.getElementById("formulario").addEventListener("submit", async (e) => {
      e.preventDefault();

      const nombre = document.getElementById("nombre").value;
      const asignatura = document.getElementById("asignatura").value;
      const tema = document.getElementById("tema").value;

      const res = await fetch("/copiloto/generar", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ nombre, asignatura, tema })
      });

      const data = await res.json();
      document.getElementById("resultado").textContent = data.resultado;
    });
  </script>
</body>
</html>
